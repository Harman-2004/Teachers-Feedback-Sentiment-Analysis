name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Configure git
        run: |
          git config --global user.email "harman@github-ci.com"
          git config --global user.name "Harman CI"
          git config --global credential.helper store

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "=== Checking token is set ==="
          if [ -z "$HF_TOKEN" ]; then
            echo "ERROR: HF_TOKEN is empty or not set!"
            exit 1
          fi
          echo "Token is set (length: ${#HF_TOKEN})"

          echo "=== Adding HF remote ==="
          git remote add hf "https://harman-2004:${HF_TOKEN}@huggingface.co/spaces/harman-2004/Teacher-Feedback-Analytics"

          echo "=== Fetching HF remote ==="
          git fetch hf || echo "Fetch failed (may be empty space)"

          echo "=== Pushing to HF ==="
          git push --force hf HEAD:main 2>&1
          echo "=== Push complete ==="
