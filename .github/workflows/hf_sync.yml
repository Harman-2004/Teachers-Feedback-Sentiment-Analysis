name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          token = os.environ.get("HF_TOKEN", "")
          if not token:
              print("ERROR: HF_TOKEN secret is not set in GitHub!")
              exit(1)

          print(f"Token found, length={len(token)}")

          api = HfApi()

          # Verify token works
          try:
              user = api.whoami(token=token)
              print(f"Authenticated as: {user['name']}")
          except Exception as e:
              print(f"ERROR: Token authentication failed: {e}")
              exit(1)

          # Upload all files
          print("Uploading files to HF Space...")
          try:
              api.upload_folder(
                  folder_path=".",
                  repo_id="harman-2004/Teacher-Feedback-Analytics",
                  repo_type="space",
                  token=token,
                  ignore_patterns=[
                      ".git/*",
                      ".github/*",
                      "__pycache__/*",
                      "*.pyc",
                      ".gitignore",
                      "node_modules/*",
                  ],
              )
              print("SUCCESS: Files uploaded to Hugging Face Space!")
          except Exception as e:
              print(f"ERROR uploading: {e}")
              exit(1)
          EOF
